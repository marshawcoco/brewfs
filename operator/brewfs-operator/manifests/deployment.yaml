apiVersion: apps/v1
kind: Deployment
metadata:
  name: brewfs-operator
  namespace: brewfs-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: brewfs-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: brewfs-operator
    spec:
      serviceAccountName: brewfs-operator
      containers:
        - name: operator
          image: ghcr.io/ivanbeethoven/brewfs-operator:latest
          imagePullPolicy: Always
          args:
            - run
          env:
            - name: RUST_LOG
              value: info
