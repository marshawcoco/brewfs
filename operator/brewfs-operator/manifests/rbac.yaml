apiVersion: v1
kind: ServiceAccount
metadata:
  name: brewfs-operator
  namespace: brewfs-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: brewfs-operator
rules:
  - apiGroups: ["storage.brewfs.io"]
    resources: ["brewfsclusters"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["storage.brewfs.io"]
    resources: ["brewfsclusters/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["storage.brewfs.io"]
    resources: ["brewfsmounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["storage.brewfs.io"]
    resources: ["brewfsmounts/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps", "services", "secrets", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: brewfs-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: brewfs-operator
subjects:
  - kind: ServiceAccount
    name: brewfs-operator
    namespace: brewfs-system
