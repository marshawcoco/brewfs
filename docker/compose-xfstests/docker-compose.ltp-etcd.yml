services:
  etcd:
    image: quay.io/coreos/etcd:v3.6.0
    container_name: etcd-brewfs-ltp
    environment:
      ETCDCTL_API: "3"
    command: >
      /usr/local/bin/etcd
      --name etcd-single
      --data-dir /etcd-data
      --listen-client-urls http://0.0.0.0:2379
      --advertise-client-urls http://etcd:2379
      --listen-peer-urls http://0.0.0.0:2380
      --initial-advertise-peer-urls http://etcd:2380
      --initial-cluster etcd-single=http://etcd:2380
      --initial-cluster-token etcd-cluster-token
      --initial-cluster-state new
      --auto-compaction-mode=revision
      --auto-compaction-retention=5000
      --quota-backend-bytes=17179869184
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 2s
      timeout: 5s
      retries: 30
    networks:
      - brewfs-ltp

  etcd-maintenance:
    image: brewfs-etcd-maintenance:local
    build:
      context: ..
      dockerfile: etcd-maintenance.Dockerfile
    depends_on:
      etcd:
        condition: service_healthy
    environment:
      ETCDCTL_API: "3"
      ETCDCTL_ENDPOINTS: http://etcd:2379
      ETCD_COMPACT_RETENTION_REVISIONS: ${ETCD_COMPACT_RETENTION_REVISIONS:-5000}
      ETCD_MAINTENANCE_INTERVAL_SECS: ${ETCD_MAINTENANCE_INTERVAL_SECS:-30}
    restart: unless-stopped
    networks:
      - brewfs-ltp

  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs-brewfs-ltp-etcd
    expose:
      - "9000"
      - "9001"
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: ${RUSTFS_CONSOLE_ENABLE:-true}
      RUSTFS_SERVER_DOMAINS: ${RUSTFS_SERVER_DOMAINS:-rustfs}
    command:
      - --address
      - :9000
      - --console-enable
      - --server-domains
      - ${RUSTFS_SERVER_DOMAINS:-rustfs}
      - --access-key
      - ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - --secret-key
      - ${RUSTFS_SECRET_KEY:-rustfsadmin}
      - /data
    volumes:
      - rustfs-data-ltp-etcd:/data
    networks:
      - brewfs-ltp

  rustfs-init:
    image: amazon/aws-cli:latest
    depends_on:
      rustfs:
        condition: service_started
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        mkdir -p /root/.aws
        printf '[default]\ns3 =\n  addressing_style = path\n' > /root/.aws/config
        timeout 180 sh -ec '
          while true; do
            aws --endpoint-url http://rustfs:9000 s3api create-bucket --bucket ${BREWFS_S3_BUCKET:-brewfs-data} >/dev/null 2>&1 && exit 0
            aws --endpoint-url http://rustfs:9000 s3api head-bucket --bucket ${BREWFS_S3_BUCKET:-brewfs-data} >/dev/null 2>&1 && exit 0
            sleep 2
          done
        '
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_EC2_METADATA_DISABLED: ${AWS_EC2_METADATA_DISABLED:-true}
    networks:
      - brewfs-ltp

  ltp:
    image: brewfs-ltp:local
    build:
      context: ../..
      dockerfile: docker/compose-xfstests/Dockerfile.ltp
    depends_on:
      etcd:
        condition: service_healthy
      etcd-maintenance:
        condition: service_started
      rustfs-init:
        condition: service_completed_successfully
    environment:
      BREWFS_META_BACKEND: etcd
      BREWFS_META_ETCD_URLS: http://etcd:2379
      BREWFS_DATA_BACKEND: s3
      BREWFS_DATA_DIR: /var/lib/brewfs/data
      BREWFS_S3_BUCKET: ${BREWFS_S3_BUCKET:-brewfs-data}
      BREWFS_S3_ENDPOINT: ${BREWFS_S3_ENDPOINT:-http://rustfs:9000}
      BREWFS_S3_REGION: ${BREWFS_S3_REGION:-us-east-1}
      BREWFS_S3_FORCE_PATH_STYLE: ${BREWFS_S3_FORCE_PATH_STYLE:-true}
      BREWFS_CONFIG_PATH: /run/brewfs/config.yaml
      BREWFS_LOG_FILE: /artifacts/brewfs.log
      BREWFS_FUSE_OP_LOG: ${BREWFS_FUSE_OP_LOG:-0}
      BREWFS_MOUNT_WAIT_SECS: ${BREWFS_MOUNT_WAIT_SECS:-60}
      BREWFS_PRE_MOUNT_WAIT_SECS: ${BREWFS_PRE_MOUNT_WAIT_SECS:-10}
      BREWFS_MOUNT_READY_DELAY_SECS: ${BREWFS_MOUNT_READY_DELAY_SECS:-1}
      BREWFS_FUSE_LOG_FILE: /artifacts/brewfs_fuse_ops.log
      BREWFS_ARTIFACT_DIR: ${BREWFS_ARTIFACT_DIR:-}
      BREWFS_ARTIFACT_ROOT: /artifacts
      LTP_SCENARIOS: fs
      LTP_EXTRA_ARGS: ${LTP_EXTRA_ARGS:-}
      LTP_SKIP_FILES: ${LTP_SKIP_FILES:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_EC2_METADATA_DISABLED: ${AWS_EC2_METADATA_DISABLED:-true}
      RUST_LOG: ${RUST_LOG:-brewfs=info}
    privileged: true
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor=unconfined
    volumes:
      - ./artifacts:/artifacts
      - ./run_ltp_in_container.sh:/usr/local/bin/run_ltp_in_container.sh:ro
      - brewfs-state-ltp-etcd:/var/lib/brewfs
    networks:
      - brewfs-ltp

networks:
  brewfs-ltp:
    driver: bridge

volumes:
  brewfs-state-ltp-etcd:
  rustfs-data-ltp-etcd:
